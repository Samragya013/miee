name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: pip install black isort flake8 flake8-bugbear
      - run: isort --check-only src/ tests/
      - run: black --check src/ tests/
      - run: flake8 src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: pip install mypy types-PyYAML
      - run: mypy src/miie/ --ignore-missing-imports

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .
      - run: pytest tests/unit/ tests/schema/ tests/contract/ tests/architecture/ -x -q --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: pip install -e .
      - run: pytest tests/integration/ -x -q --tb=short

  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: pip install -e .
      - run: pytest tests/regression/ tests/workflow/ -x -q --tb=short

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: pip install pip-audit
      - run: pip-audit

  detector-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: pip install -e .
      - run: pytest tests/unit/test_d01_distribution_drift.py tests/unit/test_d02_correlation_breakdown.py tests/unit/test_d03_threshold_compression.py -x -q --tb=short
