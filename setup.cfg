[flake8]
max-line-length = 120
extend-ignore = E203, W503, E501, B001, B007, B011, B017, B023, B028, B033, B042, F841, F811, F821, F541, E712, E722, W605, E402, F402
per-file-ignores =
    __init__.py:F401
exclude =
    archive,
    scripts,
    output,
    tmp_output,
    tmp_output_ingestion,
    .git,
    .mypy_cache,
    .pytest_cache,
    __pycache__,
    benchmarks/datasets,
    benchmarks/tmp

[mypy]
python_version = 3.10
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
disable_error_code = arg-type, operator, override, assignment, return-value, var-annotated, union-attr, index, name-defined, misc, dict-item, no-any-return, valid-type
exclude = ^archive/|^scripts/|^output/|^tmp_output/|^tmp_output_ingestion/|^benchmarks/

[tool:pytest]
testpaths = tests
asyncio_mode = auto
markers =
    slow: marks tests as slow
    benchmark: marks benchmark tests
