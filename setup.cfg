[flake8]
max-line-length = 120
extend-ignore = E203, W503
per-file-ignores =
    __init__.py:F401

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
ignore_missing_imports = True

[tool:pytest]
testpaths = tests
asyncio_mode = auto
markers =
    slow: marks tests as slow
    benchmark: marks benchmark tests
